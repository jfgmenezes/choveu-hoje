<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Já Choveu Nesse Dia?</title>
    <script src="dados.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f8f9fa; }
        .controles { background: white; padding: 20px; border-radius: 8px; display: flex; gap: 10px; margin-bottom: 20px; }
        .grid-anos { display: grid; grid-template-columns: repeat(auto-fill, minmax(60px, 1fr)); gap: 8px; }
        .bloco { height: 40px; display: flex; align-items: center; justify-content: center; font-weight: bold; border-radius: 4px; color: white; }
        .bloco-azul { background-color: #0000FF; }
        .bloco-amarelo { background-color: #FFCC00; }
        .bloco-cinza { background-color: #ccc; }
        .bloco-carregando { background-color: #eee; color: #666; border: 1px dashed #666; }
    </style>
</head>
<body>
    <h2>Já choveu nesse dia?</h2>
    <div class="controles">
        <select id="selectCidade"></select>
        <input type="text" id="inputData" value="15/06">
        <button onclick="buscar()">Buscar</button>
    </div>
    <div class="grid-anos" id="gridAnos"></div>

    <script>
        // Preenche o select com as cidades do dados.js
        const select = document.getElementById('selectCidade');
        Object.keys(historicoChuva).forEach(c => select.innerHTML += `<option value="${c}">${c}</option>`);

        async function buscar() {
            const cidade = select.value;
            const data = document.getElementById('inputData').value;
            const grid = document.getElementById('gridAnos');
            grid.innerHTML = "";
            
            const anosChuvosos = historicoChuva[cidade][data] || [];
            
            for (let ano = 1961; ano <= 2025; ano++) {
                const div = document.createElement('div');
                div.className = 'bloco ' + (anosChuvosos.includes(ano) ? 'bloco-azul' : 'bloco-amarelo');
                div.innerText = ano;
                grid.appendChild(div);
            }
            // Nota: Adicione a lógica de buscar 2026 aqui se necessário
        }
    </script>
</body>
</html>
